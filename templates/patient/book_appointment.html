<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - HealthHub</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        function reloadAvailableSlots() {
            const docId = document.getElementById("doctor_select").value;
            const dateVal = document.getElementById("date_select").value;
            const durationVal = document.getElementById("duration_select").value;
            if (docId && dateVal && durationVal) {
                window.location.href = `/patient/appointments/book?doctor_id=${docId}&date=${dateVal}&duration_minutes=${durationVal}`;
            }
        }
    </script>
</head>
<body style="background-color: #F9FAFB; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin:0;">

<nav class="navbar" style="background: linear-gradient(135deg, #047857 0%, #065f46 100%); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white;">
    <div class="navbar-brand" style="font-weight: bold; font-size: 20px;">🏥 HealthHub Patient Portal</div>
    <div class="navbar-links">
        <a href="/patient/dashboard" style="color: white; text-decoration: none; font-weight: bold;">⬅ Back to Dashboard</a>
    </div>
</nav>

<div class="dashboard-container" style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    
    <div class="action-card" style="background: #fff; padding: 35px; border-radius: 12px; border: 1px solid #E5E7EB; box-shadow: 0 4px 6px rgba(0,0,0,0.03);">
        <h2 style="margin-top: 0; margin-bottom: 25px; color: #111827; border-bottom: 2px solid #047857; padding-bottom: 10px;">Schedule a Consultation</h2>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
            <div>
                <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #374151;">Select Doctor:</label>
                <select id="doctor_select" onchange="reloadAvailableSlots()" style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 6px; background-color: white; font-size: 15px; font-family: inherit;">
                    {% for doc in doctors %}
                        <option value="{{ doc.id }}" {% if selected_doctor_id == doc.id %}selected{% endif %}>Dr. {{ doc.first_name }} {{ doc.last_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #374151;">Choose Consultation Date:</label>
                <input type="date" id="date_select" value="{{ selected_date }}" onchange="reloadAvailableSlots()" style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 15px; font-family: inherit; box-sizing: border-box;">
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #374151;">Appointment / Consultation Type:</label>
            <select id="duration_select" onchange="reloadAvailableSlots()" style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 6px; background-color: white; font-size: 15px; font-family: inherit;">
                <option value="15" {% if selected_duration == 15 %}selected{% endif %}>🩺 Standard Checkup (15 mins)</option>
                <option value="30" {% if selected_duration == 30 %}selected{% endif %}>🔬 Detailed Consultation (30 mins)</option>
                <option value="60" {% if selected_duration == 60 %}selected{% endif %}>💼 Extended Procedure (60 mins)</option>
            </select>
        </div>

        <form action="/patient/appointments/create" method="POST">
            <input type="hidden" name="doctor_id" value="{{ selected_doctor_id }}">
            <input type="hidden" name="date" value="{{ selected_date }}">
            <input type="hidden" name="duration_minutes" value="{{ selected_duration }}">

            <label style="display: block; font-weight: bold; margin-bottom: 12px; color: #374151;">Available Appointment Slots:</label>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; margin-bottom: 30px; max-height: 260px; overflow-y: auto; padding: 5px; border: 1px solid #E5E7EB; border-radius: 8px;">
                {% for slot in slots %}
                    {% if slot.is_available %}
                        <label style="display: block; text-align: center; border: 1px solid #047857; padding: 10px; border-radius: 6px; cursor: pointer; background-color: #ECFDF5; font-weight: bold; color: #065f46; transition: all 0.2s;">
                            <input type="radio" name="start_time" value="{{ slot.raw_time }}" required style="margin-right: 5px;">
                            {{ slot.time_string }}
                        </label>
                    {% else %}
                        <label style="display: block; text-align: center; border: 1px solid #E5E7EB; padding: 10px; border-radius: 6px; background-color: #F3F4F6; color: #9CA3AF; cursor: not-allowed; text-decoration: line-through;">
                            {{ slot.time_string }}
                        </label>
                    {% endif %}
                {% endfor %}
            </div>

            <button type="submit" class="btn-submit" style="width: 100%; padding: 14px; font-size: 16px; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; text-align: center; background-color: #047857; color: white;">Confirm Selected Booking Block</button>
        </form>
    </div>
</div>

</body>
</html>
