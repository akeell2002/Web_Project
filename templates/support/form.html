<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support – HealthHub</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: #F4F7F6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .support-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #E5E7EB;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            padding: 48px 40px;
            width: 100%;
            max-width: 520px;
        }

        .support-logo {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .support-sub {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 32px;
        }

        .success-banner {
            background: #D1FAE5;
            border: 1px solid #6EE7B7;
            color: #065F46;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 14px;
            color: #111827;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
            margin-bottom: 20px;
        }

        input:focus, textarea:focus {
            border-color: #005999;
            box-shadow: 0 0 0 3px rgba(0,89,153,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            background: #005999;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .submit-btn:hover { background: #004a80; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6B7280;
            text-decoration: none;
        }

        .back-link:hover { color: #005999; }
    </style>
</head>
<body>
<div class="support-card">
    <div class="support-logo">⚕️ HealthHub</div>
    <div class="support-sub">Contact Support</div>

    {% if sent %}
    <div class="success-banner">
        ✅ Your message has been sent. Our team will get back to you shortly.
    </div>
    {% endif %}

    <form method="POST" action="/support/submit">
        <label for="submitter_name">Your Name</label>
        <input type="text" id="submitter_name" name="submitter_name" placeholder="John Doe" required>

        <label for="submitter_email">Email Address</label>
        <input type="email" id="submitter_email" name="submitter_email" placeholder="you@example.com" required>

        <label for="issue_description">How can we help?</label>
        <textarea id="issue_description" name="issue_description" placeholder="Describe your issue or question..." required></textarea>

        <button type="submit" class="submit-btn">Send Message</button>
    </form>

    <a href="/" class="back-link">← Back to Home</a>
</div>

<script>
    // Show success banner if redirected back with ?sent=1
    const params = new URLSearchParams(window.location.search);
    if (params.get('sent') === '1') {
        document.querySelector('.success-banner').style.display = 'block';
    }
</script>
</body>
</html>
