{% extends "shared/base.html" %}

{% block title %}Contact Support - HealthHub{% endblock %}

{% block body %}
<body class="page-auth">

<div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="support-card">
        <div class="support-logo">HealthHub</div>
        <div class="support-sub">Contact Support</div>

        {% if sent %}
        <div class="alert alert-success">
            Your message has been sent. Our team will get back to you shortly.
        </div>
        {% endif %}

        <form method="POST" action="/support/submit">
            <label class="form-label fw-semibold small" for="submitter_name">Your Name</label>
            <input class="form-control" type="text" id="submitter_name" name="submitter_name"
                   placeholder="John Doe" required>

            <label class="form-label fw-semibold small" for="submitter_email">Email Address</label>
            <input class="form-control" type="email" id="submitter_email" name="submitter_email"
                   placeholder="you@example.com" required>

            <label class="form-label fw-semibold small" for="issue_description">How can we help?</label>
            <textarea class="form-control" id="issue_description" name="issue_description"
                      placeholder="Describe your issue or question..." required></textarea>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <a href="/" class="text-secondary text-decoration-none small d-block mt-3">Back to Home</a>
    </div>
</div>

</body>
{% endblock %}
