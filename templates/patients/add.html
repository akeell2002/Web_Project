<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Patient - Clinical Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="portal-wrapper" style="height: auto; margin: 40px 0;">
        
        <div class="brand-panel">
            <div class="system-tag">Data Entry</div>
            <div class="brand-message">
                <h2>Add New<br>Record.</h2>
                <p>Ensure all demographic data is entered accurately. Required fields must be completed before the system will allow saving to the Postgres registry.</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h3>Patient Demographics</h3>
            </div>
            
            <form method="POST" action="/patients/add">
                <div class="input-field"><input type="text" name="first_name" placeholder="First Name" required></div>
                <div class="input-field"><input type="text" name="last_name" placeholder="Last Name" required></div>
                
                <p style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">Date of Birth:</p>
                <div class="input-field"><input type="date" name="date_of_birth" required></div>
                
                <div class="input-field">
                    <select name="gender" class="modern-select" required>
                        <option value="" disabled selected>Select Gender...</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="input-field"><input type="tel" name="phone" placeholder="Phone Number" required></div>
                <div class="input-field"><input type="email" name="email" placeholder="Email Address (Optional)"></div>
                <div class="input-field"><input type="text" name="address" placeholder="Home Address (Optional)"></div>
                
                <div class="input-field">
                    <select name="blood_type" class="modern-select">
                        <option value="" disabled selected>Blood Type (Optional)...</option>
                        <option value="A+">A+</option><option value="A-">A-</option>
                        <option value="B+">B+</option><option value="B-">B-</option>
                        <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        <option value="O+">O+</option><option value="O-">O-</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Save Patient Record</button>
            </form>

            <div class="switch-auth">
                <p><a href="/patients">Cancel and Return</a></p>
            </div>
        </div>

    </div>

</body>
</html>
