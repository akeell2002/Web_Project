<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email - HealthHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F4F7F6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { background: white; border-radius: 14px; padding: 40px 44px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 40px; margin-bottom: 16px; }
        h2 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 10px; }
        p { font-size: 14px; color: #6B7280; line-height: 1.6; margin-bottom: 6px; }
        .note { font-size: 12px; color: #9CA3AF; margin-top: 16px; background: #F9FAFB; padding: 12px; border-radius: 8px; text-align: left; }
        .back-link { display: block; margin-top: 24px; }
        .back-link a { color: #005999; text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">📧</div>
    <h2>Check Your Email</h2>
    <p>If an account exists for <strong>{{ email }}</strong>, a password reset link has been sent.</p>
    <div class="note">
        <strong>Dev mode:</strong> The reset link is logged to the server console (<code>cargo run</code> output) instead of being emailed.
    </div>
    <div class="back-link">
        <a href="/staff/login">← Back to Login</a>
    </div>
</div>
</body>
</html>
