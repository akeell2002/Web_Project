<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HealthHub</title>
</head>
<body class="page-auth">
<div class="card">
    <div class="logo">⚕️ HealthHub</div>
    <div class="subtitle">Enter your email and we'll send a reset link.</div>

    <form method="POST" action="/forgot-password">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="your@email.com" required autofocus>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
    </form>

    <div class="back-link">
        Remember your password? <a href="/staff/login">Back to Login</a>
    </div>
</div>
</body>
</html>
