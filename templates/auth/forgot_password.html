{% extends "shared/base.html" %}
{% block title %}Forgot Password - HealthHub{% endblock %}
{% block body %}
    <body class="page-auth">
        <div class="d-flex align-items-center justify-content-center min-vh-100">
            <div class="card shadow-sm" style="width:100%;max-width:420px;">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-1">HealthHub</h4>
                    <p class="text-muted mb-4">Enter your email and we'll send a reset link.</p>
                    <form method="POST" action="/forgot-password">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Email Address</label>
                            <input class="form-control"
                                   type="email"
                                   name="email"
                                   placeholder="your@email.com"
                                   required
                                   autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                    </form>
                    <div class="text-center mt-3 small"> Remember your password? <a href="/staff/login">Back to Login</a> </div>
                </div>
            </div>
        </div>
    </body>
{% endblock %}
