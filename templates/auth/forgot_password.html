<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HealthHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F4F7F6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { background: white; border-radius: 14px; padding: 40px 44px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        .logo { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: #64748B; margin-bottom: 28px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
        input:focus { border-color: #005999; box-shadow: 0 0 0 3px rgba(0,89,153,0.1); }
        .form-group { margin-bottom: 18px; }
        .btn { width: 100%; background: #005999; color: white; border: none; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
        .btn:hover { background: #004070; }
        .back-link { display: block; text-align: center; margin-top: 18px; font-size: 14px; color: #6B7280; }
        .back-link a { color: #005999; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">⚕️ HealthHub</div>
    <div class="subtitle">Enter your email and we'll send a reset link.</div>

    <form method="POST" action="/forgot-password">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="your@email.com" required autofocus>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
    </form>

    <div class="back-link">
        Remember your password? <a href="/staff/login">Back to Login</a>
    </div>
</div>
</body>
</html>
