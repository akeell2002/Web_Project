{% extends "shared/base.html" %}

{% block title %}Reset Password - HealthHub{% endblock %}

{% block body %}
<body class="page-auth page-auth-reset">

    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>

    <div class="glass-card glass-card-narrow">

        <div class="glass-brand">
            <div class="glass-brand-logo">HealthHub</div>
            <div class="glass-brand-sub">Password Recovery</div>
        </div>

        <div class="glass-title">Reset Password</div>
        <div class="glass-subtitle">Enter your new password below.</div>

        {% if error %}
        <div class="glass-error">{{ error }}</div>
        {% endif %}

        {% if token %}
        <form method="POST" action="/reset-password">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="password" name="new_password" placeholder="New Password" required autofocus>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit" class="btn-glass-submit">Reset Password</button>
        </form>
        {% endif %}

        <div class="glass-links">
            <p><a href="/staff/login">Back to Login</a></p>
        </div>

    </div>

</body>
{% endblock %}
