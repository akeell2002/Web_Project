{% extends "shared/base.html" %}
{% block title %}Reset Password - HealthHub{% endblock %}
{% block body %}
    <body class="page-auth">
        <div class="d-flex align-items-center justify-content-center min-vh-100">
            <div class="card shadow-sm" style="width:100%;max-width:420px;">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-1">HealthHub</h4>
                    <p class="text-muted mb-4">Enter your new password below.</p>
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    {% if token %}
                        <form method="POST" action="/reset-password">
                            <input type="hidden" name="token" value="{{ token }}">
                            <div class="mb-3">
                                <label class="form-label fw-semibold small">New Password</label>
                                <input class="form-control"
                                       type="password"
                                       name="new_password"
                                       placeholder="New password"
                                       required
                                       autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Confirm Password</label>
                                <input class="form-control"
                                       type="password"
                                       name="confirm_password"
                                       placeholder="Confirm new password"
                                       required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                        </form>
                    {% endif %}
                    <div class="text-center mt-3 small"> <a href="/staff/login">Back to Login</a> </div>
                </div>
            </div>
        </div>
    </body>
{% endblock %}
