<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - HealthHub</title>
</head>
<body class="page-auth">
<div class="card">
    <div class="logo">⚕️ HealthHub</div>
    <div class="subtitle">Enter your new password below.</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    {% if token %}
    <form method="POST" action="/reset-password">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="New password" required autofocus>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn">Reset Password</button>
    </form>
    {% endif %}

    <div class="back-link">
        <a href="/staff/login">← Back to Login</a>
    </div>
</div>
</body>
</html>
