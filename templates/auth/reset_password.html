<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - HealthHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F4F7F6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { background: white; border-radius: 14px; padding: 40px 44px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        .logo { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: #64748B; margin-bottom: 28px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
        input[type="password"] { width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
        input[type="password"]:focus { border-color: #005999; box-shadow: 0 0 0 3px rgba(0,89,153,0.1); }
        .form-group { margin-bottom: 18px; }
        .btn { width: 100%; background: #005999; color: white; border: none; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
        .btn:hover { background: #004070; }
        .error-box { background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA; border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 18px; }
        .back-link { display: block; text-align: center; margin-top: 18px; font-size: 14px; color: #6B7280; }
        .back-link a { color: #005999; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">⚕️ HealthHub</div>
    <div class="subtitle">Enter your new password below.</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    {% if token %}
    <form method="POST" action="/reset-password">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="New password" required autofocus>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn">Reset Password</button>
    </form>
    {% endif %}

    <div class="back-link">
        <a href="/staff/login">← Back to Login</a>
    </div>
</div>
</body>
</html>
