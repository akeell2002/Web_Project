<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Consultation - HealthHub EHR</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background-color: #F3F4F6; font-family: sans-serif; margin: 0; }
        .form-container { 
            max-width: 800px; 
            margin: 40px auto; 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border: 1px solid #E5E7EB;
        }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #374151; font-size: 14px;}
        input[type="text"], textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #D1D5DB; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .btn-submit { 
            background: #10B981; 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            transition: 0.2s;
            margin-top: 20px;
        }
        .btn-submit:hover { background: #059669; }
        .section-title { 
            border-bottom: 2px solid #F3F4F6; 
            padding-bottom: 10px; 
            margin-top: 35px; 
            margin-bottom: 25px; 
            color: #111827; 
        }
        .header-box {
            background: #EFF6FF;
            border: 1px solid #BFDBFE;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<nav class="navbar" style="background: #0f172a; padding: 15px 30px; display: flex; justify-content: space-between; color: white;">
    <div style="font-weight: bold; font-size: 18px;">HealthHub Clinical Encounter</div>
    <div><a href="/staff/doctor/queue" style="color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; font-size: 14px;">Cancel & Return to Queue</a></div>
</nav>

<div class="form-container">
    <div class="header-box">
        <h2 style="margin: 0 0 5px 0; color: #1E3A8A;">Active Medical Encounter</h2>
        <p style="margin: 0; color: #3B82F6; font-size: 14px;">Appointment ID: {{ appointment_id }}</p>
    </div>

    <form action="/staff/doctor/consultation/{{ appointment_id }}" method="POST">
        
        <h3 class="section-title">1. Clinical Assessment</h3>
        
        <div class="form-group">
            <label>Reported Symptoms</label>
            <textarea name="symptoms" rows="3" placeholder="E.g., Patient reports sore throat and mild fever...">{{ symptoms }}</textarea>
        </div>

        <div class="form-group">
            <label>Primary Diagnosis <span style="color: #EF4444;">*</span></label>
            <select name="diagnosis" required>
                <option value="" disabled {% if diagnosis == "" %}selected{% endif %}>Select primary diagnosis...</option>
                <option value="Acute Pharyngitis" {% if diagnosis == "Acute Pharyngitis" %}selected{% endif %}>Acute Pharyngitis</option>
                <option value="Viral Infection" {% if diagnosis == "Viral Infection" %}selected{% endif %}>Viral Infection</option>
                <option value="Routine Checkup" {% if diagnosis == "Routine Checkup" %}selected{% endif %}>Routine Checkup</option>
                <option value="Hypertension" {% if diagnosis == "Hypertension" %}selected{% endif %}>Hypertension</option>
                <option value="Sprain / Strain" {% if diagnosis == "Sprain / Strain" %}selected{% endif %}>Sprain / Strain</option>
            </select>
        </div>

        <div class="form-group">
            <label>Treatment Notes</label>
            <textarea name="treatment_notes" rows="3" placeholder="E.g., Advised rest and plenty of fluids...">{{ treatment_notes }}</textarea>
        </div>

        <h3 class="section-title">2. Prescription Details</h3>
        <p style="font-size: 13px; color: #6B7280; margin-top: -15px; margin-bottom: 20px;"><i>Optional. Leave these fields blank if no medication is required today.</i></p>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Medicine Name</label>
                <input type="text" name="medicine_name" value="{{ medicine_name }}" placeholder="E.g., Amoxicillin">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Dosage</label>
                <input type="text" name="dosage" value="{{ dosage }}" placeholder="E.g., 500mg">
            </div>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Frequency</label>
                <input type="text" name="frequency" value="{{ frequency }}" placeholder="E.g., Twice a day">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Duration</label>
                <input type="text" name="duration" value="{{ duration }}" placeholder="E.g., 7 days">
            </div>
        </div>

        <div class="form-group">
            <label>Special Instructions</label>
            <textarea name="instructions" rows="2" placeholder="E.g., Take after meals">{{ instructions }}</textarea>
        </div>

        <button type="submit" class="btn-submit">Sign Notes & Generate Bill</button>
    </form>
</div>

</body>
</html>
