<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Clinical Note</title>
    <link rel="stylesheet" href="/static/css/style.css"> 
</head>
<body>
    
    <div class="portal-wrapper" style="height: auto; min-height: 500px; margin: 40px 0;">
        
        <div class="brand-panel" style="flex: 0.5;">
            <div class="system-tag">Patient #{{ patient_id }}</div>
            <div class="brand-message">
                <h2>Clinical<br>Notes</h2>
                <p>Log a new diagnosis and treatment plan securely into the database.</p>
            </div>
        </div>

        <div class="form-panel" style="flex: 1.5; padding: 40px;">
            <h3 style="color: white; margin-bottom: 25px;">+ New Medical Record</h3>
            
            <form action="/patients/{{ patient_id }}/records/new" method="post" style="display: flex; flex-direction: column; gap: 20px;">
                
                <input type="hidden" name="patient_id" value="{{ patient_id }}">
                <input type="hidden" name="doctor_id" value="{{ doctor_id }}">

                <div class="input-group">
                    <label for="diagnosis" style="color: #94a3b8; font-weight: bold; margin-bottom: 8px; display: block;">Diagnosis</label>
                    <input type="text" id="diagnosis" name="diagnosis" placeholder="e.g., Acute Bronchitis" required 
                           style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white;">
                </div>

                <div class="input-group">
                    <label for="prescription" style="color: #94a3b8; font-weight: bold; margin-bottom: 8px; display: block;">Prescription (Optional)</label>
                    <input type="text" id="prescription" name="prescription" placeholder="e.g., Amoxicillin 500mg" 
                           style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white;">
                </div>

                <div class="input-group">
                    <label for="notes" style="color: #94a3b8; font-weight: bold; margin-bottom: 8px; display: block;">Clinical Notes (Optional)</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Patient reports coughing for 3 days..." 
                              style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; resize: vertical;"></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 10px; align-items: center; flex-wrap: wrap;">
                    
                    <button type="submit" class="btn-submit" style="width: auto; padding: 12px 20px; background: #10b981; color: white; margin-top: 0; border: none; cursor: pointer;">Save Medical Record</button>
                    
                    <a href="/patients/{{ patient_id }}" class="btn-submit" style="width: auto; padding: 12px 20px; background: #334155; color: white; text-align: center; text-decoration: none; margin-top: 0;">Cancel & Go Back</a>
                
                </div>
            </form>
        </div>

    </div>

</body>
</html>
